<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="ACPstyle.css">
</head>

<body>
    <h1>Your Pet's Database</h1>
    <hr>

    <div class="box">
        <form id="loginForm">
            <div class="row">
                <label>Your pet's name:</label>
                <input type="message" id="name" placeholder="myname@gmail.com">
            </div>

            <div class="row">
                <label>Your pet's species:</label>
                <input type="message" id="species" placeholder="Cat / Dog / Fish / Other">
            </div>

            <div class="row">
                <label>Your pet's age:</label>
                <input type="number" id="age">
            </div>

            <button type="submit">Login</button>
        </form>
    </div>

    <p id="message"></p>

    <script src="ACPscript.js"></script>
</body>

</html>
